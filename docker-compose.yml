version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: br_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bar_restaurant_ethiopia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: br_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      - APP_ENV=production
    ports:
      - "8000:8000"
    # Production: no --reload flag
    command: python -m uvicorn backend.pg_server:app --host 0.0.0.0 --port 8000 --workers 1

  frontend:
    image: nginx:alpine
    container_name: br_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
